services:
  arisoutre:
    build: .
    container_name: bot_discord-arisoutre
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      - "otterlyapi.antredesloutres.fr:${API_PUBLIC_IP:-187.127.231.55}"
    volumes:
      # Montage des fichiers de config
      - ./config:/app/config
      # Montage du dossier de cache (persistance des données OtterCache)
      - ./cache:/app/cache
    ports:
      - "9501:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
