services:
  arisoutre:
    build: .
    container_name: bot_discord-arisoutre
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Montage des fichiers de config
      - ./config:/app/config
      # Montage du dossier de cache (persistance des données OtterCache)
      - ./cache:/app/cache
      # Montage des alias PocketBase
      - ./endpoint_alias.yaml:/app/endpoint_alias.yaml
    ports:
      - "9501:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
